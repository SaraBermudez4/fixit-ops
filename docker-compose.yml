services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-broker
    ports: 
      - "5672:5672" # Puerto del Broker (Mensajería)
      - "15672:15672" # Puerto del Dashboard (UI)
    environment: 
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  postgres:
    image: postgres:16-alpine
    container_name: fixit-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fixit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fixit-user:
    build: ./fixit-user
    environment:
      SERVER_PORT: ${SERVER_PORT_USER}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA_USER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      FIXIT_TASKS_URL: ${FIXIT_TASKS_URL}
    ports:
      - "${SERVER_PORT_USER}:${SERVER_PORT_USER}"
    networks:
      - fixit-network
    depends_on:
      postgres:
        condition: service_healthy

  fixit-tasks:
    build: ./fixit-tasks
    environment:
      SERVER_PORT: ${SERVER_PORT_TASKS}
      USER_SERVICE_URL: ${FIXIT_USER_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA_TASK}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "${SERVER_PORT_TASKS}:${SERVER_PORT_TASKS}"
    networks:
      - fixit-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  fixit-network:
    driver: bridge
    name: fixit-network

volumes:
  pg_data: